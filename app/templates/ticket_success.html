<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Submitted Successfully | Datastraw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    
    // Auto-sync dark/light mode immediately on load
    const savedTheme = localStorage.getItem("support-crm-theme");
    const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>
</head>
<body class="min-h-screen flex flex-col justify-between bg-slate-50 text-slate-800 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100">

  <header class="border-b border-slate-200 bg-white transition-colors duration-200 dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <div>
        <div class="flex items-center gap-2">
          <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Support CRM</h1>
          <span class="rounded-md bg-blue-50 px-2 py-0.5 text-xs font-semibold text-blue-700 dark:bg-blue-950 dark:text-blue-300">
            Customer Hub
          </span>
        </div>
      </div>
      <button
        onclick="toggleGlobalTheme()"
        type="button"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
      >
        Toggle Mode
      </button>
    </div>
  </header>

  <main class="mx-auto flex w-full max-w-md flex-col justify-center px-4 py-12 sm:px-6 my-auto">
    
    <div class="rounded-xl bg-white p-8 text-center shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
      
      <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-100 dark:bg-green-950/50">
        <svg class="h-6 w-6 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>

      <h2 class="mt-4 text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">
        Ticket Created!
      </h2>
      
      <p class="mt-3 text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
        Your incident has been successfully broadcast to our routing engine. An enterprise agent will evaluate your logs shortly.
      </p>

      <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 flex flex-col gap-3">
        <a 
          href="/tickets/new" 
          class="rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-bold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-blue-700 hover:shadow-md"
        >
          Submit Another Request
        </a>
        <a 
          href="/" 
          class="rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
        >
          Return to Welcome Hub
        </a>
      </div>
    </div>
  </main>

  <footer class="border-t border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl flex-col gap-1 px-4 py-5 text-center text-xs text-slate-500 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:text-left dark:text-slate-400">
      <p>&copy; 2026 Pawan Shinde. All rights reserved.</p>
      <p>Proprietary software for Datastraw Company.</p>
    </div>
  </footer>

  <script>
    function toggleGlobalTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem("support-crm-theme", isDark ? "dark" : "light");
    }
  </script>
</body>
</html>
