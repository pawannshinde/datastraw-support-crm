<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Support Ticket | Datastraw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    
    // Auto-sync dark/light mode immediately on load
    const savedTheme = localStorage.getItem("support-crm-theme");
    const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>
</head>
<body class="min-h-screen flex flex-col justify-between bg-slate-50 text-slate-800 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100">

  <header class="border-b border-slate-200 bg-white transition-colors duration-200 dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <div>
        <div class="flex items-center gap-2">
          <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Support CRM</h1>
          <span class="rounded-md bg-blue-50 px-2 py-0.5 text-xs font-semibold text-blue-700 dark:bg-blue-950 dark:text-blue-300">
            Customer Hub
          </span>
        </div>
      </div>
      <button
        onclick="toggleGlobalTheme()"
        type="button"
        class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
      >
        Toggle Mode
      </button>
    </div>
  </header>

  <main class="mx-auto flex w-full max-w-2xl flex-col justify-center px-4 py-12 sm:px-6 my-auto">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">
        Open a New Support Ticket
      </h2>
      <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">
        Please fill out the details below. An agent will review your incident request shortly.
      </p>
    </div>

    <div class="rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
      <form id="ticket-submit-form" class="space-y-6">
        
        <div class="grid gap-6 sm:grid-cols-2">
          <div>
            <label for="customer_name" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Your Name</label>
            <div class="mt-2">
              <input 
                id="customer_name" 
                name="customer_name" 
                type="text" 
                required 
                placeholder="Pawan Shinde"
                class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
              >
            </div>
          </div>

          <div>
            <label for="customer_email" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Email Address</label>
            <div class="mt-2">
              <input 
                id="customer_email" 
                name="customer_email" 
                type="email" 
                required 
                placeholder="client@datastraw.co"
                class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
              >
            </div>
          </div>
        </div>

        <div>
          <label for="issue_category" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Select Issue Category</label>
          <div class="mt-2">
            <select 
              id="issue_category" 
              required
              onchange="handleCategoryChange(this.value)"
              class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
            >
              <option value="" disabled selected>-- Choose what describes your issue --</option>
              <option value="Product Not Delivered">📦 Product Not Delivered</option>
              <option value="Unable to Login">🔐 Unable to Login / Access Account</option>
              <option value="Payment Failed / Unable to Make Payment">💳 Payment Failed / Unable to Make Payment</option>
              <option value="Refund Request">💰 Refund Request</option>
              <option value="Incorrect Item Received">🔄 Incorrect Item Received</option>
              <option value="Technical Bug / Website Failure">⚡ Technical Bug / Website Failure</option>
              <option value="Other">📝 Other Issue (Type Custom Subject below)</option>
            </select>
          </div>
        </div>

        <div id="custom-subject-container" class="hidden">
          <label for="subject" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Custom Subject / Incident Summary</label>
          <div class="mt-2">
            <input 
              id="subject" 
              name="subject" 
              type="text" 
              placeholder="Enter a custom summary for your incident"
              class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
            >
          </div>
        </div>

        <div>
          <label for="description" class="block text-sm font-bold text-slate-700 dark:text-slate-300">Detailed Comments / Description</label>
          <div class="mt-2">
            <textarea 
              id="description" 
              name="description" 
              rows="4" 
              required 
              placeholder="Provide comprehensive details or remarks regarding your encounter..."
              class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
            ></textarea>
          </div>
        </div>

        <div class="flex items-center justify-between gap-4 pt-4 border-t border-slate-100 dark:border-slate-800">
          <a href="/" class="text-sm font-semibold text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 transition">
            &larr; Cancel
          </a>
          <button 
            type="submit" 
            class="rounded-lg bg-blue-600 px-5 py-2 text-sm font-bold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-blue-700 hover:shadow-md"
          >
            Submit Ticket
          </button>
        </div>
      </form>
    </div>
  </main>

  <footer class="border-t border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl flex-col gap-1 px-4 py-5 text-center text-xs text-slate-500 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:text-left dark:text-slate-400">
      <p>&copy; 2026 Pawan Shinde. All rights reserved.</p>
      <p>Proprietary software for Datastraw Company.</p>
    </div>
  </footer>

  <script>
    function toggleGlobalTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem("support-crm-theme", isDark ? "dark" : "light");
    }

    function handleCategoryChange(val) {
      const container = document.getElementById('custom-subject-container');
      const input = document.getElementById('subject');
      if (val === 'Other') {
        container.classList.remove('hidden');
        input.required = true;
      } else {
        container.classList.add('hidden');
        input.required = false;
        input.value = '';
      }
    }

    document.getElementById('ticket-submit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const customerName = document.getElementById('customer_name').value.trim();
      const customerEmail = document.getElementById('customer_email').value.trim();
      const categorySelect = document.getElementById('issue_category').value;
      const customSubject = document.getElementById('subject').value.trim();
      const description = document.getElementById('description').value.trim();

      const finalSubject = categorySelect === 'Other' ? customSubject : categorySelect;

      try {
        const response = await fetch('/api/tickets/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_name: customerName,
            customer_email: customerEmail,
            subject: finalSubject,
            description: description
          })
        });

        if (!response.ok) {
          throw new Error('Failed to create ticket profile entry.');
        }

        alert('Ticket submitted successfully!');
        window.location.href = '/';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
