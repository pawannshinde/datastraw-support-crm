<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Login | Datastraw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    
    // Auto-sync dark/light mode immediately on load
    const savedTheme = localStorage.getItem("support-crm-theme");
    const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>
</head>
<body class="min-h-screen flex flex-col justify-between bg-slate-50 text-slate-800 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100">

  <header class="border-b border-slate-200 bg-white transition-colors duration-200 dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <div>
        <span class="text-sm font-black tracking-wider text-slate-900 dark:text-white uppercase">Datastraw</span>
        <span class="ml-1 text-xs font-semibold text-blue-600 dark:text-blue-400">Support Terminal</span>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-8 rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
      <div class="text-center">
        <h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Agent Workspace Gate</h2>
        <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">Provide system authentication credentials to sync terminal dashboard</p>
      </div>

      <form id="login-form" class="mt-8 space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Agent Identity ID (Email)</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-sm">👤</span>
            <input 
              type="text" 
              id="username" 
              required 
              placeholder="agent@datastraw.co" 
              class="w-full rounded-lg border border-slate-300 bg-transparent py-2 pl-9 pr-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
            >
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Secure Encryption Key</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-sm">🔒</span>
            <input 
              type="password" 
              id="password" 
              required 
              placeholder="••••••••" 
              class="w-full rounded-lg border border-slate-300 bg-transparent py-2 pl-9 pr-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white"
            >
          </div>
        </div>

        <button 
          type="submit" 
          class="w-full flex justify-center rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-blue-700 hover:shadow-md"
        >\
          Login &rarr;
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="/" class="text-sm font-semibold text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 transition">
          &larr; Back to Welcome Hub
        </a>
      </div>
    </div>
  </main>

  <footer class="border-t border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl flex-col gap-1 px-4 py-5 text-center text-xs text-slate-500 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:text-left dark:text-slate-400">
      <p>&copy; 2026 Pawan Shinde. All rights reserved.</p>
      <p>Proprietary software pipeline infrastructure.</p>
    </div>
  </footer>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;

      try {
        const response = await fetch('/api/tickets/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameInput, password: passwordInput })
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.detail || 'Authentication rejected');
        }

        const data = await response.json();
        window.location.href = data.redirect;
        
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
